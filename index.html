<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zapowiedzi głosowe</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        
        html, body {
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
            font-family: 'Signika', sans-serif;
            color: #212121;
        }
        
        .app {
            max-width: 1400px;
            margin: 0 auto;
            justify-content: center;
        }
        
        h1 {
            font-size: 28px;
            font-weight: 500;
            color: #212121;
            margin-bottom: 8px;
            text-align: center;
        }
        
        .subtitle {
            font-size: 14px;
            color: #757575;
            text-align: center;
            margin-bottom: 32px;
            font-weight: 400;
        }
        
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
            padding: 24px;
            width: 70%;
            margin-bottom: 24px;
        }
        
        .select-container {
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }
        
        .select-wrapper {
            flex: 1;
            max-width: 400px;
        }
        
        .input-field {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #2196F3;
            box-shadow: 0 0 0 2px rgba(33,150,243,0.2);
        }
        
        .input-field::placeholder {
            color: #9e9e9e;
        }
        
        .label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #424242;
            margin-bottom: 8px;
        }
        
        .selected-sound {
            display: block;
            padding: 12px 16px;
            background-color: #E3F2FD;
            border: 1px solid #BBDEFB;
            border-radius: 4px;
            font-weight: 500;
            color: #1976D2;
            margin-bottom: 16px;
            font-size: 16px;
        }
        
        select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: white;
            font-size: 16px;
            font-family: 'Signika', sans-serif;
            height: 500px;
            resize: vertical;
        }
        
        select:focus {
            outline: none;
            border-color: #2196F3;
            box-shadow: 0 0 0 2px rgba(33,150,243,0.2);
        }
        
        option {
            padding: 12px;
            white-space: nowrap;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            font-family: 'Signika', sans-serif;
        }
        
        .btn-primary {
            background-color: #2196F3;
            margin-bottom: 16px;
            color: white;
        }
        
        .btn-primary:hover {
            background-color: #1976D2;
        }
        
        .btn-secondary {
            background-color: #f5f5f5;
            color: #424242;
            border: 1px solid #ddd;
        }
        
        .btn-secondary:hover {
            background-color: #e0e0e0;
            border-color: #bbb;
        }
        
        .material-icons {
            font-size: 20px;
            width: 20px;
            height: 20px;
        }
        
        #playlist {
            margin-top: 16px;
            list-style: none;
            padding: 0;
            max-height: 400px;
            overflow-y: auto;
        }
        
        #playlist li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            margin-bottom: 8px;
            background: #fafafa;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-weight: 500;
            font-size: 15px;
        }
        
        #playlist li:hover {
            background: #f5f5f5;
            border-color: #d0d0d0;
        }
        
        .playlist-text {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .playlist-controls {
            display: flex;
            gap: 8px;
        }
        
        .btn-small {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
            border-radius: 4px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            font-family: 'Signika', sans-serif;
            padding: 4px 16px;
            font-size: 13px;
            letter-spacing: 0.02em;
        }
        
        .btn-danger {
            background-color: #f44336;
            color: white;
        }
        
        .btn-danger:hover {
            background-color: #d32f2f;
        }
        
        .btn-danger {
            background-color: #2196f3;
            color: white;
        }
        
        .btn-danger:hover {
            background-color: #1976d2;
        }

        @media (max-width: 768px) {
            .select-container {
                flex-direction: column;
            }
            
            .select-wrapper {
                max-width: none;
            }
            
            select {
                height: 300px;
            }
        }
    </style>
</head>

    <script>
        let playlist = [];

        function addSound(selectId) {
        const soundSelect = document.getElementById(selectId);
        const rawValue = soundSelect.value;
        const selectedSoundText = soundSelect.options[soundSelect.selectedIndex].textContent;

        if (rawValue) {

            const match = rawValue.match(/\{Q(\d+)\}(.+)/);

            if (!match) return;

            const q = match[1];
            const soundFile = match[2];

            let b;

            if (q === "1") {
                b = "https://gtfscc.github.io/zapowiedzi/";
            } else {
                b = `https://gtfscc.github.io/zapowiedzi-${q}/`;
            }

            const selectedSound = `${b}${soundFile}`;

            playlist.push(selectedSound);

            const playlistElement = document.getElementById('playlist');
            const newSoundElement = document.createElement('li');
            const newSoundText = document.createElement('span');

            newSoundText.textContent = selectedSoundText;
            newSoundElement.appendChild(newSoundText);

            const deleteButton = document.createElement('button');
            deleteButton.className = 'btn-small btn-danger';
            deleteButton.textContent = 'Usuń';
            deleteButton.onclick = () => removeSound(newSoundElement, selectedSound);

            newSoundElement.appendChild(deleteButton);

            newSoundElement.classList.add('playlist-item');
            playlistElement.appendChild(newSoundElement);

            checkTextOverflow(newSoundElement);

            console.log(`Dodano: ${selectedSoundText}`);
            console.log(`URL: ${selectedSound}`);
        }
    }

        function undoAdd() {
            if (playlist.length > 0) {
                const removedSound = playlist.pop();
                const playlistElement = document.getElementById('playlist');
                playlistElement.removeChild(playlistElement.lastChild);

                console.log(`Cofnięto dodanie: ${removedSound}`);
            }
        }

        function removeSound(element, sound) {
            const index = playlist.indexOf(sound);
            if (index > -1) {
                playlist.splice(index, 1);
                element.remove();

                console.log(`Usunięto: ${sound}`);
            }
        }

        function playPlaylist() {
            const audioPlayer = document.getElementById('audioPlayer');
            let currentSoundIndex = 0;

            function playNextSound() {
                if (currentSoundIndex < playlist.length) {
                    const sound = playlist[currentSoundIndex];
                    audioPlayer.src = sound;
                    audioPlayer.play().then(() => {
                        console.log(`Odtwarzanie: ${sound}`);
                        currentSoundIndex++;
                    }).catch(error => {
                        console.error(`Błąd odtwarzania: ${error}`);
                    });
                } else {
                    currentSoundIndex = 0;
                }
            }

            audioPlayer.onended = playNextSound;
            playNextSound();
        }

        function resetPlaylist() {
            playlist = [];
            const playlistElement = document.getElementById('playlist');
            playlistElement.innerHTML = '';

            console.log('Lista odtwarzania została wyczyszczona');
        }

        function filterSounds(selectId) {
            const searchBox = (selectId === 'soundSelect2') ? document.getElementById('searchBox2') : document.getElementById('searchBox1');
            const filter = searchBox.value.toLowerCase().trim();
            const soundSelect = document.getElementById(selectId);
            const options = Array.from(soundSelect.options);

            if (filter === "") {
                options.forEach(opt => opt.style.display = '');
                return;
            }

            const gVariant = (str) => {
                let zam = [str];
                const rules = [
                    { patterns: [/a/g], replace: 'ą' },
                    { patterns: [/on/g, /om/g], replace: 'ą' },
                    { patterns: [/ą/g, /a/g], replace: 'on' },
                    { patterns: [/c/g], replace: 'ć' },
                    { patterns: [/e/g], replace: 'ę' },
                    { patterns: [/ę/g, /e/g], replace: 'en' },
                    { patterns: [/en/g, /em/g], replace: 'ę' },
                    { patterns: [/l/g], replace: 'ł' },
                    { patterns: [/ts/g], replace: 'c' },
                    { patterns: [/c/g], replace: 'ts' },
                    { patterns: [/o/g], replace: 'ó' },
                    { patterns: [/u/g, /ó/g], replace: 'u' },
                    { patterns: [/ó/g], replace: 'u' },
                    { patterns: [/ź/g], replace: 'zi' },
                    { patterns: [/ż/g], replace: 'rz' },
                    { patterns: [/z/g], replace: 'ż' },
                    { patterns: [/z/g], replace: 'rz' },
                    { patterns: [/z/g], replace: 'ź' },
                    { patterns: [/z/g], replace: 'zi' }
                ];

                rules.forEach(rule => {
                    rule.patterns.forEach(p => {
                        if (str.match(p)) zam.push(str.replace(p, rule.replace));
                    });
                });
                return [...new Set(zam)];
            };

            const fVariant = gVariant(filter);

            const matches = options.map(opt => {
                const text = opt.textContent.toLowerCase();
                const words = text.split(' ');
                let score = -1;

                const startF = text.startsWith(filter) || words.some(w => w.startsWith(filter));
                const containF = text.includes(filter);
                
                const startV = fVariant.some(v => text.startsWith(v) || words.some(w => w.startsWith(v)));
                const containV = fVariant.some(v => text.includes(v));

                if (startF) score = 4;
                else if (startV) score = 3;
                else if (containF) score = 2;
                else if (containV) score = 1;

                return { opt, score };
            });

            matches.sort((a, b) => b.score - a.score);

            matches.forEach(m => {
                if (m.score > 0) {
                    m.opt.style.display = '';
                    soundSelect.appendChild(m.opt);
                } else {
                    m.opt.style.display = 'none';
                }
            });
        }

        function selectSound(event, selectId) {
            const soundSelect = document.getElementById(selectId);
            const selectedSoundText = soundSelect.options[soundSelect.selectedIndex].textContent;
            document.getElementById('selectedSound1').textContent = (selectId === 'soundSelect1') ? selectedSoundText : '---';
            document.getElementById('selectedSound2').textContent = (selectId === 'soundSelect2') ? selectedSoundText : '---';
        }

        function checkTextOverflow(element) {
            const span = element.querySelector('span');
            if (span.scrollWidth > element.clientWidth) {
                span.classList.add('scrolling-text');
            }
        }

        function checkOptionTextOverflow() {
            const select1Options = document.querySelectorAll('#soundSelect1 option');
            const select2Options = document.querySelectorAll('#soundSelect2 option');

            select1Options.forEach(option => {
                if (option.scrollWidth > option.clientWidth) {
                    option.classList.add('scrolling-option-1');
                } else {
                    option.classList.remove('scrolling-option-1');
                }
            });

            select2Options.forEach(option => {
                if (option.scrollWidth > option.clientWidth) {
                    option.classList.add('scrolling-option-2');
                } else {
                    option.classList.remove('scrolling-option-2');
                }
            });
        }

        window.onresize = function() {
            checkOptionTextOverflow();
        };
		

        window.onload = () => {
            document.getElementById("start-announcements").addEventListener("click", startAnnouncements);
            document.getElementById("skip-announcement").addEventListener("click", skipAnnouncement);
            checkOptionTextOverflow();
        };

        checkOptionTextOverflow();
    </script>
