    <style>
		html, body {
			background-color: #2e2e2e;
		}
        .select-container {
            display: flex;
            justify-content: space-between;
			background-color: #2E2E2E;
        }
        .select-wrapper {
            width: 300px;
        }
        .select-wrapper select {
            display: block;
            position: relative;
            z-index: 1000;
            border: 1px solid #ccc;
            overflow-y: auto;
            width: 100%;
			background-color: #2E2E2E;
        }
        .select-wrapper option {
            white-space: nowrap;
            overflow: visible;
			background-color: #2E2E2E;
        }
        .scrolling-text {
            animation: scrollText 15s linear infinite;
        }
        @keyframes scrollText {
            0% {
                transform: translateX(80%);
            }
            100% {
                transform: translateX(-110%);
            }
        }
        .scrolling-option-1 {
            animation: scrollOptionText1 10s linear infinite;
        }
        @keyframes scrollOptionText1 {
            0% { transform: translateX(135%);
            }
            100% { transform: translateX(-135%);
            }
        }
        .scrolling-option-2 {
            animation: scrollOptionText2 21s linear infinite;
        }
        @keyframes scrollOptionText2 {
            0% { transform: translateX(110%);
            }
            100% { transform: translateX(-200%);
            }
        }
        .selected-sound {
            display: inline-block;
            margin-left: 10px;
            font-weight: bold;
        }
        table {
            border: 0px solid black;
            width: 100%;
            border-collapse: collapse;
        }
        td { display: inline-block;
            padding: 10px;
            vertical-align: top;
            border: 0px solid black;
        }
        #playlist {
            margin-top: 10px;
            list-style-type: none;
            padding: 0;
        }
        #playlist li {
            padding: 5px;
            margin: 5px 0;
            background-color: #3C3C3C;
            border: 1px solid #666;
            border-radius: 4px;
            white-space: nowrap;
            overflow: hidden;
            position: relative;
            height: 30px;
            line-height: 30px;
            color: white;
            font-weight: 700;
        }
        #playlist li span {
            display: inline-block;
            position: absolute;
            white-space: nowrap;
            will-change: transform;
        }
        #playlist li button {
            float: right;
            margin-left: 10px;
			
        }
        h1 {
            font-family: Arial;
            text-align: center;
            color: white;	
        }
        .str1 {
            color: white;
            background-color: #4882AD;
            padding: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 18px;
            display: inline-block;
            text-align: center;
            margin: 5px 0;
            text-decoration: none;
        }
        .str1:hover {
            color: white;
            background-color: rgb(136, 116, 175);
        }
        .str2 {
            font-size: 17px;
            padding-top: 5px;
            font-weight: 800;
			color: white;
            border-bottom: solid 3px #7fb2d8;
        }
        .str3 {
            font-size: 15px;
            font-weight: 900;
			background-color: #2e2e2e;
			color: white;
            text-decoration: none;
        }
        .str3:hover {
            display: inline-block;
            color: white;
            background-color: #363744;
        }
        .str3a {
            background-color: #F83131;
            font-size: 15px;
			color: white;
            font-weight: 900;
            text-decoration: none;
        }
        .str3a:hover {
            display: inline-block;
            color: white;
            background-color: #AD2828;
        }
        .str3b {
            background-color: #288FEF;

			color: white;
            font-weight: 900;
            text-decoration: none;

        .str3b:hover {

    <audio id="audioPlayer" controls></audio>
    <script>
        let playlist = [];

        function addSound(selectId) {
            const soundSelect = document.getElementById(selectId);
            const selectedSound = soundSelect.value;
            const selectedSoundText = soundSelect.options[soundSelect.selectedIndex].textContent;
            if (selectedSound) {
                playlist.push(selectedSound);
                const playlistElement = document.getElementById('playlist');
                const newSoundElement = document.createElement('li');
                const newSoundText = document.createElement('span');
                newSoundText.textContent = selectedSoundText;
                newSoundElement.appendChild(newSoundText);

                // Add delete button
                const deleteButton = document.createElement('button');
                deleteButton.textContent = 'Usuń';
                deleteButton.onclick = () => removeSound(newSoundElement, selectedSound);
                newSoundElement.appendChild(deleteButton);

                newSoundElement.classList.add('playlist-item');
                playlistElement.appendChild(newSoundElement);
                checkTextOverflow(newSoundElement);

                console.log(`Dodano: ${selectedSoundText}`);
            }
        }

        function undoAdd() {
            if (playlist.length > 0) {
                const removedSound = playlist.pop();
                const playlistElement = document.getElementById('playlist');
                playlistElement.removeChild(playlistElement.lastChild);

                console.log(`Cofnięto dodanie: ${removedSound}`);
            }
        }

        function removeSound(element, sound) {
            const index = playlist.indexOf(sound);
            if (index > -1) {
                playlist.splice(index, 1);
                element.remove();

                console.log(`Usunięto: ${sound}`);
            }
        }

        function playPlaylist() {
            const audioPlayer = document.getElementById('audioPlayer');
            let currentSoundIndex = 0;

            function playNextSound() {
                if (currentSoundIndex < playlist.length) {
                    const sound = playlist[currentSoundIndex];
                    audioPlayer.src = sound;
                    audioPlayer.play().then(() => {
                        console.log(`Odtwarzanie: ${sound}`);
                        currentSoundIndex++;
                    }).catch(error => {
                        console.error(`Błąd odtwarzania: ${error}`);
                    });
                } else {
                    currentSoundIndex = 0;
                }
            }

            audioPlayer.onended = playNextSound;
            playNextSound();
        }

        function resetPlaylist() {
            playlist = [];
            const playlistElement = document.getElementById('playlist');
            playlistElement.innerHTML = '';

            console.log('Lista odtwarzania została wyczyszczona');
        }

        function filterSounds(selectId) {
            const searchBox = (selectId === 'soundSelect2') ? document.getElementById('searchBox2') : document.getElementById('searchBox1');
            const filter = searchBox.value.toLowerCase();
            const soundSelect = document.getElementById(selectId);
            const options = soundSelect.options;
            for (let i = 0; i < options.length; i++) {
                const optionText = options[i].textContent.toLowerCase();
                if (optionText.includes(filter)) {
                    options[i].style.display = '';
                } else {
                    options[i].style.display = 'none';
                }
            }
        }

        function selectSound(event, selectId) {
            const soundSelect = document.getElementById(selectId);
            const selectedSoundText = soundSelect.options[soundSelect.selectedIndex].textContent;
            document.getElementById('selectedSound1').textContent = (selectId === 'soundSelect1') ? selectedSoundText : '';
            document.getElementById('selectedSound2').textContent = (selectId === 'soundSelect2') ? selectedSoundText : '';
        }

        function checkTextOverflow(element) {
            const span = element.querySelector('span');
            if (span.scrollWidth > element.clientWidth) {
                span.classList.add('scrolling-text');
            }
        }

        function checkOptionTextOverflow() {
            const select1Options = document.querySelectorAll('#soundSelect1 option');
            const select2Options = document.querySelectorAll('#soundSelect2 option');

            select1Options.forEach(option => {
                if (option.scrollWidth > option.clientWidth) {
                    option.classList.add('scrolling-option-1');
                } else {
                    option.classList.remove('scrolling-option-1');
                }
            });

            select2Options.forEach(option => {
                if (option.scrollWidth > option.clientWidth) {
                    option.classList.add('scrolling-option-2');
                } else {
                    option.classList.remove('scrolling-option-2');
                }
            });
        }

        window.onresize = function() {
            checkOptionTextOverflow();
        };
		

        window.onload = () => {
            document.getElementById("start-announcements").addEventListener("click", startAnnouncements);
            document.getElementById("skip-announcement").addEventListener("click", skipAnnouncement);
            checkOptionTextOverflow();
        };

        checkOptionTextOverflow();
    </script>
